name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  install-and-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install OCRDS
        run: npm ci --prefix ocrds
      - name: Install OCRDS-AMS
        run: npm ci --prefix ocrds-ams
      - name: Syntax check entrypoints
        run: node --check ocrds/index.js && node --check ocrds-ams/index.js
